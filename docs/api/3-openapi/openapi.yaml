openapi: 3.0.0
info:
  title: API Sistema de Reservas
  version: 1.0.0
  description: API REST para gestionar reservas

paths:

  /reservas:
    get:
      summary: Obtener todas las reservas
      responses:
        '200':
          description: Lista de reservas

    post:
      summary: Crear reserva
      responses:
        '201':
          description: Reserva creada

  /reservas/{id}:
    get:
      summary: Obtener una reserva
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reserva encontrada

    patch:
      summary: Modificar reserva
      responses:
        '200':
          description: Reserva modificada

    delete:
      summary: Eliminar reserva
      responses:
        '204':
          description: Reserva eliminada
